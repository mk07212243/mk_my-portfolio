<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEIC単語ドリル</title>
<style>
  :root {
    --bg: #EEF0E8;
    --card: #FBFAF4;
    --border: #d9dbcd;
    --border-light: #e5e6dd;
    --ink: #242920;
    --muted: #6b7062;
    --muted-2: #8b8f7d;
    --accent: #B23B2E;
    --correct: #3F7D5C;
    --tab-inactive: #E1E3D6;
    --tab-inactive-hover: #d9dbcd;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  .wrap { width: 100%; max-width: 440px; }
  header { text-align: center; margin-bottom: 28px; }
  h1 {
    font-family: Georgia, "Yu Mincho", serif;
    font-size: 28px;
    letter-spacing: 0.02em;
    margin: 0;
  }
  header p { font-size: 13px; color: var(--muted); margin: 6px 0 0; }

  .tabs { display: flex; gap: 4px; }
  .tab {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 8px;
    border-radius: 8px 8px 0 0;
    font-size: 13px;
    font-weight: 500;
    background: var(--tab-inactive);
    color: var(--muted);
    border: 1px solid transparent;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .tab:hover { background: var(--tab-inactive-hover); }
  .tab.active {
    background: var(--card);
    color: var(--ink);
    border: 1px solid var(--border);
    border-bottom: none;
  }

  .card {
    position: relative;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 0 8px 8px 8px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    padding: 32px;
    min-height: 320px;
    display: flex;
    flex-direction: column;
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 24px;
  }
  .card-top-right {
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: flex-end;
    flex-shrink: 0;
  }
  .sub-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted-2);
    margin: 0;
  }
  .reset-link {
    flex-shrink: 0;
    background: none;
    border: none;
    padding: 0;
    font-size: 11px;
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
  }
  .reset-link:hover { opacity: 0.75; }
  .progress-label {
    flex-shrink: 0;
    font-size: 11px;
    color: var(--muted-2);
    white-space: nowrap;
  }
  .word-display {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .word-display p {
    font-family: Georgia, "Yu Mincho", serif;
    font-size: 36px;
    text-align: center;
    margin: 0;
  }

  input[type="text"] {
    width: 100%;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 18px;
    text-align: center;
    background: transparent;
    border: none;
    border-bottom: 2px solid #c7c9bb;
    outline: none;
    padding: 8px 0;
    color: var(--ink);
    transition: border-color 0.15s;
  }
  input[type="text"]:focus { border-bottom-color: var(--ink); }
  input[type="text"]:disabled { opacity: 0.7; }

  button { font-family: inherit; }
  .btn-primary {
    width: 100%;
    margin-top: 16px;
    padding: 11px;
    border-radius: 6px;
    background: var(--ink);
    color: var(--card);
    border: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: #3a4032; }
  .btn-primary:disabled { opacity: 0.3; cursor: default; }
  .btn-secondary {
    width: 100%;
    padding: 11px;
    border-radius: 6px;
    background: #F1F2EA;
    color: var(--ink);
    border: 1px solid var(--border);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-secondary:hover { background: #e6e8db; }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(36,41,32,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 50;
  }
  .modal-box {
    width: 100%;
    max-width: 300px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.18);
  }
  .modal-msg { font-size: 26px; font-weight: 700; margin: 0 0 20px; color: var(--accent); line-height: 1.4; }
  .modal-actions { display: flex; gap: 10px; }
  .modal-actions button { margin-top: 0; }

  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 24px;
  }
  .choice-btn {
    position: relative;
    padding: 12px 12px 12px 34px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #F1F2EA;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    color: var(--ink);
    text-align: left;
    transition: background 0.15s;
  }
  .choice-btn:hover:not(:disabled) { background: #e6e8db; }
  .choice-btn:disabled { cursor: default; }
  .choice-btn.correct { background: rgba(63,125,92,0.1); border-color: var(--correct); color: var(--correct); }
  .choice-btn.wrong { background: rgba(178,59,46,0.1); border-color: var(--accent); color: var(--accent); }
  .choice-btn.faded { opacity: 0.5; }
  .key-hint {
    position: absolute;
    top: 50%;
    left: 8px;
    transform: translateY(-50%);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: var(--muted-2);
    line-height: 1.3;
    text-align: center;
  }

  .feedback { margin-top: 12px; }
  .feedback-line {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 500;
  }
  .feedback-line.correct { color: var(--correct); }
  .feedback-line.wrong { color: var(--accent); }

  .stamp {
    position: absolute;
    top: 24px;
    right: 24px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, serif;
    font-weight: bold;
    font-size: 24px;
    transform: rotate(-14deg);
    opacity: 0.85;
    pointer-events: none;
    animation: stampIn 0.25s ease-out;
  }
  @keyframes stampIn {
    from { opacity: 0; transform: scale(1.6) rotate(-14deg); }
    to { opacity: 0.85; transform: scale(1) rotate(-14deg); }
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 12px;
  }
  .empty-state p { font-size: 14px; color: var(--muted); line-height: 1.6; margin: 0; }

  .mistakes-wrap { display: flex; flex-direction: column; gap: 24px; }
  .mistake-block:not(:last-child) { border-bottom: 1px solid var(--border-light); padding-bottom: 20px; }
  .mistake-title { font-size: 13px; font-weight: 600; margin: 0 0 10px; color: var(--ink); }
  .table-scroll { overflow-x: auto; max-height: 260px; overflow-y: auto; }
  .mistake-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .mistake-table th, .mistake-table td { padding: 7px 8px; border-bottom: 1px solid var(--border-light); text-align: left; white-space: nowrap; }
  .mistake-table th { color: var(--muted-2); font-weight: 600; font-size: 11px; position: sticky; top: 0; background: var(--card); }
  .mistake-table th:last-child, .mistake-table td:last-child { text-align: right; white-space: normal; width: 48px; }
  .mistake-table td:nth-child(2) { white-space: normal; }
  .mistake-empty { color: var(--muted); font-size: 13px; white-space: normal; }

  footer {
    margin-top: 18px;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted-2);
    padding: 0 2px;
  }

  @media (max-width: 420px) {
    .card { padding: 24px 20px; }
    .word-display p { font-size: 30px; }
  }
</style>
</head>

  { id: 932, en: "suitable", ja: "ふさわしい" },

let stats = {};
try { stats = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch (e) { stats = {}; }

let mode = "ja-en";
let current = null;
let choices = [];
let feedback = null;
let selectedChoiceId = null;
let inputValue = "";
let resetStep = 0; // 0: 非表示, 1: 1回目の確認, 2: 2回目の確認

// 4択のキーボード操作用: 各行のいずれのキーでもその選択肢を選べる(Enterキーとの同時押しが必要)
const KEY_ROWS = [["1", "q", "a", "z"], ["2", "w", "s", "x"], ["3", "e", "d", "c"], ["4", "r", "f", "v"]];

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function weakWords() {
  return WORDS.filter((w) => {
    const s = stats[w.id];
    return s && s.wrong > s.right;
  });
}

function poolForMode() {
  return mode === "weak" ? weakWords() : WORDS;
}

function pickWord(pool, excludeId) {
  const candidates = pool.length > 1 ? pool.filter((w) => w.id !== excludeId) : pool;
  return candidates[Math.floor(Math.random() * candidates.length)];
}

// 和→英・英→和はそれぞれ独立に、全単語を1周し終えるまで同じ単語を出題しない
const cycleQueues = { "ja-en": [], "en-ja": [] };
// 各方向で、今の周回で出題済み(=解答済み)の単語数(1周したら0に戻る)
const cycleProgress = { "ja-en": 0, "en-ja": 0 };
// 1周し終えて、専用画面で一時停止中かどうか
const lapDone = { "ja-en": false, "en-ja": false };
// 他のタブに移動しても、答えていない問題を保持しておくための保存領域
const savedQuestion = { "ja-en": null, "en-ja": null };

function refillCycleQueue(m) {
  cycleQueues[m] = shuffle(WORDS.map((w) => w.id));
  cycleProgress[m] = 0;
  lapDone[m] = false;
}

function nextIdFromCycle(m) {
  cycleProgress[m]++;
  return cycleQueues[m].pop();
}

function cycleProgressPercent(m) {
  return WORDS.length ? Math.floor((cycleProgress[m] / WORDS.length) * 100) : 0;
}

function snapshotQuestion(m) {
  return m === "ja-en"
    ? { current, feedback, inputValue }
    : { current, choices, feedback, selectedChoiceId };
}

function applySnapshot(m, snap) {
  current = snap.current;
  feedback = snap.feedback;
  if (m === "ja-en") {
    inputValue = snap.inputValue;
  } else {
    choices = snap.choices;
    selectedChoiceId = snap.selectedChoiceId;
  }
}

function saveStats() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(stats)); } catch (e) { console.error("保存に失敗しました", e); }
}

function resetAllStats() {
  stats = {};
  saveStats();
  resetStep = 0;
  render();
}

function recordAnswer(wordId, correct, direction) {
  const cur = stats[wordId] || { right: 0, wrong: 0 };
  const dir = cur[direction] || { right: 0, wrong: 0 };
  stats[wordId] = {
    right: cur.right + (correct ? 1 : 0),
    wrong: cur.wrong + (correct ? 0 : 1),
    enJa: cur.enJa || { right: 0, wrong: 0 },
    jaEn: cur.jaEn || { right: 0, wrong: 0 },
    [direction]: { right: dir.right + (correct ? 1 : 0), wrong: dir.wrong + (correct ? 0 : 1) },
  };
  saveStats();
}

// 英→和・和→英それぞれで、間違えた単語とその回数を集計する
function mistakesByDirection(direction) {
  return WORDS
    .map((w) => ({ word: w, wrong: (stats[w.id] && stats[w.id][direction] && stats[w.id][direction].wrong) || 0 }))
    .filter((x) => x.wrong > 0)
    .sort((a, b) => b.wrong - a.wrong);
}

function nextWord() {
  const pool = poolForMode();
  inputValue = "";
  feedback = null;
  selectedChoiceId = null;
  if (!pool.length) { current = null; choices = []; return; }
  const excludeId = current ? current.id : null;
  let w;
  if (mode === "ja-en" || mode === "en-ja") {
    if (cycleQueues[mode].length === 0) {
      if (cycleProgress[mode] > 0) {
        // 直前に答えた単語が、この周回で最後の1語だった → 専用画面で一時停止
        lapDone[mode] = true;
        current = null;
        return;
      }
      refillCycleQueue(mode);
    }
    const nextId = nextIdFromCycle(mode);
    w = WORDS.find((x) => x.id === nextId);
  } else {
    w = pickWord(pool, excludeId);
  }
  current = w;
  if (mode === "en-ja" || mode === "weak") {
    const distractors = shuffle(WORDS.filter((x) => x.id !== w.id)).slice(0, 3);
    choices = shuffle([w, ...distractors]);
  }
}

// 1周終了の専用画面で「次の周回を始める」を押したときに呼ばれる
function continueLap(m) {
  refillCycleQueue(m);
  savedQuestion[m] = null;
  nextWord();
  render();
}

function switchMode(m) {
  // 和→英・英→和は、まだ答えていない問題があれば保存しておく(戻ってきたときに再開するため)
  if (mode === "ja-en" || mode === "en-ja") {
    savedQuestion[mode] = snapshotQuestion(mode);
  }

  mode = m;

  if (m === "mistakes") {
    feedback = null;
    selectedChoiceId = null;
  } else if (m === "ja-en" || m === "en-ja") {
    if (lapDone[m]) {
      current = null;
      feedback = null;
    } else if (savedQuestion[m]) {
      applySnapshot(m, savedQuestion[m]);
    } else {
      nextWord();
    }
  } else {
    nextWord();
  }
  render();
}

function submitTyped() {
  if (!current || feedback) return;
  const correct = inputValue.trim().toLowerCase() === current.en.toLowerCase();
  feedback = { correct, answer: current.en };
  recordAnswer(current.id, correct, "jaEn");
}

function submitChoice(choiceId) {
  if (!current || feedback) return;
  const choiceWord = WORDS.find((w) => w.id === choiceId);
  const correct = choiceWord.id === current.id;
  selectedChoiceId = choiceId;
  feedback = { correct, answer: current.ja };
  recordAnswer(current.id, correct, "enJa");
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function statsSummary() {
  let totalAttempts = 0, totalCorrect = 0;
  Object.values(stats).forEach((s) => { totalAttempts += s.right + s.wrong; totalCorrect += s.right; });
  if (totalAttempts === 0) return "まだ記録がありません";
  const acc = Math.round((totalCorrect / totalAttempts) * 100);
  return `正解率 ${acc}%（${totalCorrect}/${totalAttempts}）`;
}

const MODE_META = {
  "ja-en": { label: "和→英", sub: "日本語の意味に合う英単語を入力" },
  "en-ja": { label: "英→和", sub: "英単語に合う日本語を4つから選択" },
  "weak": { label: "苦手単語", sub: "間違いが多い単語だけを復習" },
  "mistakes": { label: "間違い集計", sub: "英→和・和→英それぞれで間違えた回数をまとめて表示" },
};

function mistakeTableHtml(title, list) {
  const rows = list.length
    ? list.map((x) => `<tr><td>${esc(x.word.en)}</td><td>${esc(x.word.ja)}</td><td>${x.wrong}</td></tr>`).join("")
    : `<tr><td colspan="3" class="mistake-empty">まだ間違いの記録がありません</td></tr>`;
  return `
    <div class="mistake-block">
      <h2 class="mistake-title">${title}</h2>
      <div class="table-scroll">
        <table class="mistake-table">
          <thead><tr><th>英単語</th><th>意味</th><th>回数</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function renderMistakes() {
  return `
    <div class="mistakes-wrap">
      ${mistakeTableHtml("英→和で間違えた単語", mistakesByDirection("enJa"))}
      ${mistakeTableHtml("和→英で間違えた単語", mistakesByDirection("jaEn"))}
    </div>`;
}

function resetModalHtml() {
  if (resetStep === 0) return "";
  const msg = resetStep === 1 ? "リセットしますか？" : "本当にリセットしますか？";
  return `
    <div class="modal-backdrop">
      <div class="modal-box">
        <p class="modal-msg">${msg}</p>
        <div class="modal-actions">
          <button class="btn-secondary" data-action="reset-no">いいえ</button>
          <button class="btn-primary" data-action="reset-yes">はい</button>
        </div>
      </div>
    </div>`;
}

function render() {
  const app = document.getElementById("app");
  const wc = weakWords().length;

  const tabsHtml = Object.keys(MODE_META).map((key) => {
    const label = key === "weak" ? `苦手単語 (${wc})` : MODE_META[key].label;
    return `<div class="tab ${mode === key ? "active" : ""}" data-mode="${key}">${label}</div>`;
  }).join("");

  const showProgress = mode === "ja-en" || mode === "en-ja";

  let bodyHtml = "";
  if (mode === "mistakes") {
    bodyHtml = renderMistakes();
  } else if ((mode === "ja-en" || mode === "en-ja") && lapDone[mode]) {
    bodyHtml = `
      <div class="empty-state">
        <p>🎉 登録されている${WORDS.length}語をすべて出題しました。<br>お疲れさまでした！</p>
        <button class="btn-primary" style="margin-top:4px;width:auto;padding:10px 20px;" data-action="continue-lap">次の周回を始める</button>
      </div>`;
  } else if (!current) {
    bodyHtml = `
      <div class="empty-state">
        <p>苦手単語はまだありません。<br>他のモードで練習して、間違えた単語をここに集めましょう。</p>
        <button class="btn-primary" style="margin-top:4px;width:auto;padding:10px 20px;" data-action="start-ja-en">和→英モードへ</button>
      </div>`;
  } else if (mode === "ja-en") {
    bodyHtml = `
      <div class="word-display"><p>${esc(current.ja)}</p></div>
      <div>
        <input type="text" id="typed-input" placeholder="英単語を入力" autocomplete="off" spellcheck="false"
          value="${esc(inputValue)}" ${feedback ? "disabled" : ""}>
        ${feedback ? feedbackHtml() : `<button class="btn-primary" data-action="submit-typed" ${inputValue.trim() ? "" : "disabled"}>答え合わせ</button>`}
      </div>`;
  } else {
    bodyHtml = `
      <div class="word-display"><p>${esc(current.en)}</p></div>
      <div class="choices">
        ${choices.map((c, i) => {
          let cls = "choice-btn";
          if (feedback) {
            if (c.id === current.id) cls += " correct";
            else if (c.id === selectedChoiceId) cls += " wrong";
            else cls += " faded";
          }
          const keys = KEY_ROWS[i].map((k) => k.toUpperCase());
          const hint = `${keys[0]}${keys[1]}<br>${keys[2]}${keys[3]}`;
          return `<button class="${cls}" data-choice-id="${c.id}" ${feedback ? "disabled" : ""}><span class="key-hint">${hint}</span>${esc(c.ja)}</button>`;
        }).join("")}
      </div>
      ${feedback ? `<div>${feedbackHtml(false)}</div>` : ""}`;
  }

  app.innerHTML = `
    <header>
      <h1>TOEIC単語ドリル</h1>
      <p>毎日コツコツ、赤ペンで丸をつけるように</p>
    </header>
    <div class="tabs">${tabsHtml}</div>
    <div class="card">
      <div class="card-top">
        <p class="sub-label">${MODE_META[mode].sub}</p>
        <div class="card-top-right">
          ${showProgress ? `<span class="progress-label">1周の出題進捗 ${cycleProgressPercent(mode)}%</span>` : ""}
          <button class="reset-link" data-action="reset-stats">学習記録をリセット</button>
        </div>
      </div>
      ${bodyHtml}
      ${feedback ? `<div class="stamp">${feedback.correct ? "○" : "✕"}</div>` : ""}
    </div>
    <footer>
      <span>${statsSummary()}</span>
      <span>記録はこの端末に自動保存されます</span>
    </footer>
    ${resetModalHtml()}
  `;

  attachEvents();
}

function feedbackHtml(showAnswer = true) {
  const cls = feedback.correct ? "correct" : "wrong";
  const text = feedback.correct ? "正解です" : (showAnswer ? `不正解 — 正解は "${esc(feedback.answer)}"` : "不正解");
  return `
    <div class="feedback">
      <div class="feedback-line ${cls}">${feedback.correct ? "✓" : "✕"} ${text}</div>
      <button class="btn-primary" data-action="next">次の単語へ</button>
    </div>`;
}

function attachEvents() {
  document.querySelectorAll("[data-mode]").forEach((el) => {
    el.addEventListener("click", () => switchMode(el.dataset.mode));
  });
  const nextBtn = document.querySelector('[data-action="next"]');
  if (nextBtn) nextBtn.addEventListener("click", () => { nextWord(); render(); });

  const startBtn = document.querySelector('[data-action="start-ja-en"]');
  if (startBtn) startBtn.addEventListener("click", () => switchMode("ja-en"));

  const submitBtn = document.querySelector('[data-action="submit-typed"]');
  if (submitBtn) submitBtn.addEventListener("click", () => { submitTyped(); render(); });

  document.querySelectorAll("[data-choice-id]").forEach((el) => {
    el.addEventListener("click", () => { submitChoice(Number(el.dataset.choiceId)); render(); });
  });

  const input = document.getElementById("typed-input");
  if (input) {
    input.focus();
    input.selectionStart = input.selectionEnd = input.value.length;
    input.addEventListener("input", (e) => {
      inputValue = e.target.value;
      const btn = document.querySelector('[data-action="submit-typed"]');
      if (btn) btn.disabled = !inputValue.trim();
    });
  }

  const resetBtn = document.querySelector('[data-action="reset-stats"]');
  if (resetBtn) resetBtn.addEventListener("click", () => { resetStep = 1; render(); });

  const resetNo = document.querySelector('[data-action="reset-no"]');
  if (resetNo) resetNo.addEventListener("click", () => { resetStep = 0; render(); });

  const resetYes = document.querySelector('[data-action="reset-yes"]');
  if (resetYes) resetYes.addEventListener("click", () => {
    if (resetStep === 1) { resetStep = 2; render(); } else { resetAllStats(); }
  });

  const continueBtn = document.querySelector('[data-action="continue-lap"]');
  if (continueBtn) continueBtn.addEventListener("click", () => continueLap(mode));

  // クリックでボタンにフォーカスが残ると、直後のEnterキーがブラウザ標準の
  // 「フォーカス中のボタンをEnterで再度押す」動作と衝突することがあるため防ぐ
  document.querySelectorAll("button").forEach((el) => {
    el.addEventListener("mousedown", (e) => e.preventDefault());
  });
}

// Enterキーで「答え合わせ」「次の単語へ」、数字/QWER/ASDF/ZXCVキーで4択を操作できるようにする(一度だけ登録)
document.addEventListener("keydown", (e) => {
  // キーを押しっぱなしにした時の連続発火(オートリピート)による誤操作を防ぐ
  if (e.repeat) return;

  if (e.key === "Enter") {
    if ((mode === "ja-en" || mode === "en-ja") && lapDone[mode]) {
      e.preventDefault();
      continueLap(mode);
      return;
    }
    if (feedback) {
      e.preventDefault();
      nextWord();
      render();
    } else if (mode === "ja-en" && inputValue.trim()) {
      e.preventDefault();
      submitTyped();
      render();
    } else if (mode === "en-ja" || mode === "weak") {
      // このモードではEnterに割り当てた動作がなくても、ブラウザ標準の
      // 「フォーカス中のボタンをEnterで押す」動作が誤って発火しないようにする
      e.preventDefault();
    }
    return;
  }

  if ((mode === "en-ja" || mode === "weak") && current && !feedback) {
    const key = e.key.toLowerCase();
    const idx = KEY_ROWS.findIndex((row) => row.includes(key));
    if (idx !== -1 && choices[idx]) {
      e.preventDefault();
      submitChoice(choices[idx].id);
      render();
    }
  }
});

nextWord();
render();
</script>
